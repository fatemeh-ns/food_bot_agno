version: "3.9"

services:
  app:
    build: .
    container_name: food-agent

    volumes:
      - .:/app
      - ./logs:/app/logs

    env_file:
      - .env

    depends_on:
      - db

    command: python app/main.py

  db:
    image: postgres:15

    container_name: food-db

    restart: always

    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: fooddb

    ports:
      - "5432:5432"

    volumes:
      - pgdata:/var/lib/postgresql/data

  adminer:
    image: adminer

    container_name: db-adminer

    restart: always

    ports:
      - "8080:8080"

    depends_on:
      - db

volumes:
  pgdata:
